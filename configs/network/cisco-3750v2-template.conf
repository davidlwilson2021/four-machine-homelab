! Cisco 3750v2 baseline template for lab VLANs
! Apply carefully on-device; validate in maintenance window.

hostname LAB-3750V2
no ip domain-lookup

vlan 10
 name LAB-MGMT
vlan 20
 name LAB-STORAGE
vlan 30
 name LAB-COMPUTE
vlan 40
 name LAB-DMZ

interface vlan 10
 ip address [REDACTED_PRIVATE_IP] 255.255.255.0
 no shutdown

interface vlan 20
 ip address [REDACTED_PRIVATE_IP] 255.255.255.0
 no shutdown

interface vlan 30
 ip address [REDACTED_PRIVATE_IP] 255.255.255.0
 no shutdown

interface vlan 40
 ip address [REDACTED_PRIVATE_IP] 255.255.255.0
 no shutdown

ip routing

! Example trunk to PA-3020
interface GigabitEthernet1/0/1
 description UPLINK_TO_PA3020
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40
 spanning-tree portfast trunk

! Example access ports (replace with actual mapping)
interface GigabitEthernet1/0/10
 description ANTSLE_IPMI
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast

interface GigabitEthernet1/0/11
 description ANTSLE_DATA
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast

interface GigabitEthernet1/0/12
 description MAC_PRO
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast

interface GigabitEthernet1/0/13
 description MSI_CODEX
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast

! Management and hardening stubs
line vty 0 4
 transport input ssh
 login local

end
