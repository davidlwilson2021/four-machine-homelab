# Phase 4 — Mac Pro data platform (draft)
# Deploy on the compute host after Linux + Docker install.
# Copy to host and run: docker compose --env-file .env up -d
# For public safety, all secrets are required from environment variables.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped

  # Airflow and Jupyter Hub: add official compose overlays in Phase 4
  # See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/

volumes:
  postgres_data:
  minio_data:
